name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "DEPLOYMENT_URL.txt"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Pages for this repository
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --method POST "repos/${GITHUB_REPOSITORY}/pages" -f build_type=workflow >/dev/null 2>&1 || \
          gh api --method PUT "repos/${GITHUB_REPOSITORY}/pages" -f build_type=workflow >/dev/null 2>&1 || true

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Record deployment URL
        run: |
          printf '%s\n' "${{ steps.deployment.outputs.page_url }}" > DEPLOYMENT_URL.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add DEPLOYMENT_URL.txt
          git diff --cached --quiet || git commit -m "Record Pages deployment [skip ci]"
          git push
